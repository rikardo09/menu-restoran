<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — AR Menu</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d14; color: #f0f0f0; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-box { background: #13131f; border: 1px solid rgba(245,200,66,0.2); padding: 32px; border-radius: 14px; width: 100%; max-width: 400px; }
    h1 { color: #f5c842; font-size: 1.5rem; margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
    input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-family: inherit; }
    input:focus { outline: none; border-color: #f5c842; }
    button { width: 100%; padding: 12px; background: #f5c842; color: #0d0d14; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
    button:active { transform: scale(0.98); }
    #error-msg { color: #f87171; font-size: 0.8rem; text-align: center; margin-top: 12px; display: none; }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>✦ Login Admin</h1>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="admin@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" id="btn-login">Masuk Dashboard</button>
      <div id="error-msg">Email atau password salah.</div>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://gmaazbtnstjmtuvmjgpg.supabase.co";
    const SUPABASE_KEY = "sb_publishable_tz7Gsf3ppyoTO_2ER4jQsA_UhIb3I4S";
    const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Cek session, jika sudah login langsung arahkan ke admin.html
    dbClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "admin.html";
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-login");
      const err = document.getElementById("error-msg");
      
      btn.textContent = "Memeriksa...";
      err.style.display = "none";

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await dbClient.auth.signInWithPassword({ email, password });

      if (error) {
        err.style.display = "block";
        err.textContent = error.message;
        btn.textContent = "Masuk Dashboard";
      } else {
        window.location.href = "admin.html";
      }
    });
  </script>
</body>
</html>
